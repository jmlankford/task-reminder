[taskreminder]

# Full URL of your Flask / Task Reminder server
flask_url    = http://192.168.1.100:5000

# Timezone for interpreting morning/evening times and remind_at values
# Must be a valid pytz timezone name — see https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
timezone     = America/New_York

# Scheduled toast times (24-hour HH:MM, in the timezone above)
# These fire for every active reminder that has no remind_at set
morning_time = 07:30
evening_time = 19:30
